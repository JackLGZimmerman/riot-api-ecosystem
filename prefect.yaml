name: riot-api-ecosystem
prefect-version: 3.5.0

# Declarative deployment actions (no interactive build/push/pull prompts).
build: []
push: []

# Your code is baked into the Docker image; just set in-container working dir.
pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

deployments:
  - name: riot-pipeline
    version: null
    tags: []
    description: null
    schedule: null
    concurrency_limit:
      limit: 1
      collision_strategy: CANCEL_NEW
    entrypoint: app/worker/pipelines/prefect_flow.py:riot_pipeline
    parameters: {}
    enforce_parameter_schema: true
    work_pool:
      name: docker-pool
      work_queue_name: default
      job_variables:
        image: riot-pipeline:latest
        image_pull_policy: Never
        user: "1000:1000"
        env:
          CLICKHOUSE_HOST: clickhouse
        # RIOT_PROJECT_DIR must be exported to the absolute repo root before
        # `prefect deploy` (the docker work pool mounts host paths into the job).
        volumes:
          - "{{ $RIOT_PROJECT_DIR }}/.env:/app/.env:ro"
          - "{{ $RIOT_PROJECT_DIR }}/app/core/logging/logs:/app/app/core/logging/logs"
        networks:
          - riot-api-ecosystem_default
